# pgAdmin4 Helm values for k3s data lakehouse
# Chart: runix/pgadmin4 (1.62.0, app version 9.13)
# Purpose: Web UI for managing PostgreSQL (Polaris CNPG cluster)
# Namespace: dwh (same as Polaris/CNPG)

image:
  tag: "9.13"
  pullPolicy: IfNotPresent

replicaCount: 1

# Admin credentials — change in production!
env:
  email: admin@lakehouse.local
  password: admin123

# NodePort for external access
service:
  type: NodePort
  port: 80
  nodePort: 30543

# Persist pgAdmin configuration (saved connections, settings)
persistentVolume:
  enabled: true
  size: 1Gi
  storageClass: local-path

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 500m

# Pre-configure the Polaris PostgreSQL server connection
# This JSON is written to /pgadmin4/servers.json on startup
serverDefinitions:
  enabled: true
  servers:
    PolarisPG:
      Name: "Polaris PostgreSQL (CNPG)"
      Group: "Lakehouse"
      Host: "polaris-pg-rw.dwh.svc.cluster.local"
      Port: 5432
      MaintenanceDB: "polaris"
      Username: "polaris"
      SSLMode: "prefer"
      Comment: "CNPG-managed PostgreSQL cluster for Apache Polaris metadata"

# No ingress — using NodePort
ingress:
  enabled: false

# Deployment strategy
strategy:
  type: Recreate
